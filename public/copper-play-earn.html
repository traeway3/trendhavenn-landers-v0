<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Copper – Get Started</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:hsl(222,47%,6%);
  color:#fff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

:root{
  --green:hsl(158,64%,52%);
  --green-rgb:52,211,153;
}

/* Background */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-g{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(10,25,60,.95) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 90%,rgba(5,30,50,.9) 0%,transparent 55%),
    linear-gradient(160deg,hsl(222,47%,7%) 0%,hsl(222,60%,4%) 100%);
  background-size:200% 200%;
  animation:gradShift 12s ease infinite;
}
.bg-grid{
  position:absolute;inset:0;opacity:.03;
  background-image:
    linear-gradient(rgba(255,255,255,1) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,1) 1px,transparent 1px);
  background-size:60px 60px;
}
.sparkles{position:absolute;inset:0;pointer-events:none}
.sp{position:absolute;border-radius:50%;animation:sparkle linear infinite;opacity:0}

/* Animations */
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
@keyframes sparkle{
  0%{opacity:0;transform:translateY(0) scale(0)}
  15%{opacity:1}85%{opacity:.4}
  100%{opacity:0;transform:translateY(-110px) scale(1.2)}
}
@keyframes cardIn{
  0%{opacity:0;transform:translateY(28px) scale(.97)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes textIn{
  0%{opacity:0;transform:translateY(16px)}
  100%{opacity:1;transform:translateY(0)}
}
@keyframes arrowBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(8px)}
}
@keyframes btnPulse{
  0%,100%{
    box-shadow:0 0 22px rgba(var(--green-rgb),.4),0 8px 30px rgba(var(--green-rgb),.2);
    transform:scale(1);
  }
  50%{
    box-shadow:0 0 40px rgba(var(--green-rgb),.65),0 10px 44px rgba(var(--green-rgb),.35);
    transform:scale(1.036);
  }
}
@keyframes shine{
  0%{left:-100%}100%{left:160%}
}

/* Card */
.card{
  position:relative;
  z-index:10;
  width:calc(100% - 48px);
  max-width:340px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(var(--green-rgb),.16);
  border-radius:22px;
  padding:44px 28px 40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  box-shadow:0 20px 70px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
  animation:cardIn .65s cubic-bezier(.16,1,.3,1) both .05s;
}

/* Headline */
.headline{
  font-size:30px;
  font-weight:900;
  line-height:1.15;
  letter-spacing:-.03em;
  color:#fff;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .3s;
}
.headline .hi{
  color:var(--green);
  display:block;
  margin-top:2px;
}

/* Arrow */
.arrow-wrap{
  margin:24px 0 22px;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .45s;
}
.arrow{
  display:inline-block;
  animation:arrowBounce 1.15s ease-in-out infinite;
}
.arrow svg{
  width:30px;height:30px;
  color:var(--green);
  filter:drop-shadow(0 0 8px rgba(var(--green-rgb),.55));
}

/* Button */
.cta-btn{
  display:block;
  width:100%;
  padding:19px 24px;
  background:var(--green);
  color:#000;
  font-size:15px;
  font-weight:900;
  letter-spacing:.12em;
  text-transform:uppercase;
  border:none;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  animation:btnPulse 2s ease-in-out infinite, textIn .6s cubic-bezier(.16,1,.3,1) both .6s;
  transition:transform .12s;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  -webkit-user-select:none;
}
.cta-btn::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);
  animation:shine 3.5s ease-in-out infinite 2s;
  pointer-events:none;
}
.cta-btn:active{transform:scale(.96)!important;animation-play-state:paused}
</style>
</head>
<body>

<div class="bg">
  <div class="bg-g"></div>
  <div class="bg-grid"></div>
  <div class="sparkles" id="sparkles"></div>
</div>

<div class="card">
  <h1 class="headline">
    Click here to Get
    <span class="hi">Started</span>
  </h1>
  <div class="arrow-wrap">
    <span class="arrow">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16.5L4.5 9h15L12 16.5z"/>
      </svg>
    </span>
  </div>
  <button id="ctaBtn" class="cta-btn">Continue</button>
</div>

<script>
// === SPARKLES ===
(function(){
  var c = document.getElementById('sparkles');
  var cols = ['rgba(52,211,153,.7)','rgba(52,211,153,.4)','rgba(255,255,255,.3)','rgba(74,222,128,.55)'];
  for(var i=0;i<28;i++){
    var el=document.createElement('div');
    el.className='sp';
    var sz=Math.random()*3+2;
    el.style.cssText=[
      'left:'+(Math.random()*100)+'%',
      'bottom:'+(Math.random()*70)+'%',
      'width:'+sz+'px',
      'height:'+sz+'px',
      'background:'+cols[Math.floor(Math.random()*cols.length)],
      'animation-duration:'+(Math.random()*4+3)+'s',
      'animation-delay:'+(Math.random()*6)+'s'
    ].join(';');
    c.appendChild(el);
  }
})();

// === CONTINUE BUTTON — opens in new tab, passes all URL params ===
(function(){
  var DEST = 'https://www.trendhavenn.com/copper-us.html';

  function buildUrl(){
    var p = new URLSearchParams(window.location.search);
    return p.toString() ? DEST + '?' + p.toString() : DEST;
  }

  document.getElementById('ctaBtn').addEventListener('click', function(){
    // window.open called directly from user gesture — always opens new tab,
    // forces out of TikTok in-app browser into Safari/Chrome
    var w = window.open(buildUrl(), '_blank', 'noopener,noreferrer');
    // Fallback: if popup was blocked for any reason, navigate in same tab
    if(!w || w.closed || typeof w.closed === 'undefined'){
      window.location.href = buildUrl();
    }
  });
})();
</script>

<!-- TikTok In-App Browser Breakout (pre-lander level) -->
<script>
(function(){
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isTikTok = /tiktok|musical_ly|bytedance/i.test(ua);
  if(!isTikTok) return;
  try{
    if(sessionStorage.getItem('ttBreakout')==='1') return;
    sessionStorage.setItem('ttBreakout','1');
  }catch(e){}
  var currentUrl = window.location.href;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);
  if(isIOS){
    window.location.href = 'x-safari-' + currentUrl;
    setTimeout(function(){ window.location.href = currentUrl; }, 25);
  } else if(isAndroid){
    var intent = 'intent://' + currentUrl.replace(/https?:\/\//, '') + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
    window.location.href = intent;
    setTimeout(function(){ window.location.href = currentUrl; }, 25);
  }
})();
</script>
</body>
</html>
