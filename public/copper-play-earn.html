<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="Earn real cash rewards with Copper. Play games, get paid.">
<title>Copper – Get Started</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:hsl(222,47%,6%);
  color:#fff;
  min-height:100vh;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
}

:root{
  --green:hsl(158,64%,52%);
  --green-rgb:52,211,153;
}

/* === BACKGROUND === */
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-g{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 20% 10%,rgba(10,25,60,.95) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 90%,rgba(5,30,50,.9) 0%,transparent 55%),
    linear-gradient(160deg,hsl(222,47%,7%) 0%,hsl(222,60%,4%) 100%);
  background-size:200% 200%;
  animation:gradShift 12s ease infinite;
}
.bg-grid{
  position:absolute;inset:0;opacity:.03;
  background-image:linear-gradient(rgba(255,255,255,1) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,1) 1px,transparent 1px);
  background-size:60px 60px;
}
.sparkles{position:absolute;inset:0;pointer-events:none}
.sp{position:absolute;border-radius:50%;animation:sparkle linear infinite;opacity:0}

/* === ANIMATIONS === */
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

@keyframes sparkle{
  0%{opacity:0;transform:translateY(0) scale(0)}
  15%{opacity:1}
  85%{opacity:.5}
  100%{opacity:0;transform:translateY(-120px) scale(1.2)}
}

@keyframes cardIn{
  0%{opacity:0;transform:translateY(32px) scale(.96)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes logoIn{
  0%{opacity:0;transform:scale(0) rotate(-180deg);filter:blur(16px)}
  60%{transform:scale(1.1) rotate(8deg);filter:blur(0)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}

@keyframes logoGlow{
  0%,100%{box-shadow:0 0 20px rgba(var(--green-rgb),.2),0 0 50px rgba(var(--green-rgb),.1)}
  50%{box-shadow:0 0 34px rgba(var(--green-rgb),.45),0 0 80px rgba(var(--green-rgb),.22)}
}

@keyframes textIn{
  0%{opacity:0;transform:translateY(20px)}
  100%{opacity:1;transform:translateY(0)}
}

@keyframes arrowBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(7px)}
}

@keyframes btnPulse{
  0%,100%{
    transform:scale(1);
    box-shadow:0 0 24px rgba(var(--green-rgb),.4),0 8px 32px rgba(var(--green-rgb),.25);
  }
  50%{
    transform:scale(1.038);
    box-shadow:0 0 42px rgba(var(--green-rgb),.6),0 12px 48px rgba(var(--green-rgb),.38);
  }
}

@keyframes btnShine{
  0%{left:-100%}
  100%{left:160%}
}

/* === CARD === */
.card-wrap{
  position:relative;
  z-index:10;
  width:calc(100% - 40px);
  max-width:360px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(var(--green-rgb),.18);
  border-radius:24px;
  padding:40px 28px 36px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow:0 24px 80px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.06);
  animation:cardIn .7s cubic-bezier(.16,1,.3,1) both .1s;
}

/* Logo */
.logo-wrap{
  width:72px;height:72px;
  border-radius:50%;
  border:1.5px solid rgba(var(--green-rgb),.25);
  background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  animation:logoIn .9s cubic-bezier(.34,1.56,.64,1) both .2s, logoGlow 3s ease-in-out infinite 1.2s;
  margin-bottom:24px;
}
.logo-wrap img{width:58px;height:58px;border-radius:50%;object-fit:cover}

/* Headline */
.headline{
  font-size:28px;
  font-weight:900;
  line-height:1.18;
  letter-spacing:-.03em;
  color:#fff;
  animation:textIn .65s cubic-bezier(.16,1,.3,1) both .5s;
}
.headline .hi{
  color:var(--green);
  display:block;
}

/* Arrow */
.arrow-wrap{
  margin:22px 0 20px;
  animation:textIn .65s cubic-bezier(.16,1,.3,1) both .65s;
}
.arrow{
  animation:arrowBounce 1.2s ease-in-out infinite;
  display:inline-block;
}
.arrow svg{
  width:28px;height:28px;
  color:var(--green);
  filter:drop-shadow(0 0 8px rgba(var(--green-rgb),.5));
}

/* CTA Button */
.cta-btn{
  display:block;
  width:100%;
  padding:18px 24px;
  background:var(--green);
  color:#000;
  font-size:15px;
  font-weight:900;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:none;
  border-radius:14px;
  cursor:pointer;
  text-decoration:none;
  text-align:center;
  position:relative;
  overflow:hidden;
  animation:btnPulse 2s ease-in-out infinite, textIn .65s cubic-bezier(.16,1,.3,1) both .8s;
  transition:transform .15s;
  -webkit-tap-highlight-color:transparent;
}
.cta-btn::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:55%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);
  animation:btnShine 3.5s ease-in-out infinite 2s;
}
.cta-btn:active{transform:scale(.97)!important}

/* Sub note */
.note{
  margin-top:14px;
  font-size:11px;
  color:rgba(255,255,255,.28);
  animation:textIn .65s cubic-bezier(.16,1,.3,1) both .95s;
}
</style>
</head>

<!-- TikTok In-App Browser Breakout Script -->
<script>
(function() {
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isTikTok = /tiktok|musical_ly|bytedance/i.test(ua);
  if (!isTikTok) return;
  try {
    if (sessionStorage.getItem('ttBreakout') === '1') return;
    sessionStorage.setItem('ttBreakout', '1');
  } catch (e) {}
  var currentUrl = window.location.href;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);
  if (isIOS) {
    window.location.href = 'x-safari-' + currentUrl;
    setTimeout(function() { window.location.href = currentUrl; }, 25);
  } else if (isAndroid) {
    var intent = 'intent://' + currentUrl.replace(/https?:\/\//, '') + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
    window.location.href = intent;
    setTimeout(function() { window.location.href = currentUrl; }, 25);
  }
})();
</script>
