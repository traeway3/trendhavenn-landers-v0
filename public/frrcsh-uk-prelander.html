<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<title>Freecash – Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@700;800&display=swap" rel="stylesheet">
<!-- TikTok In-App Browser Breakout (page load) -->
<script>
(function(){
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isTikTok = /tiktok|musical_ly|bytedance/i.test(ua);
  if(!isTikTok) return;
  try{ if(sessionStorage.getItem('ttBreakout')==='1') return; sessionStorage.setItem('ttBreakout','1'); }catch(e){}
  var url = window.location.href;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);
  if(isIOS){ window.location.href='x-safari-'+url; setTimeout(function(){window.location.href=url;},25); }
  else if(isAndroid){ window.location.href='intent://'+url.replace(/https?:\/\//,'')+'#Intent;scheme=https;action=android.intent.action.VIEW;end'; setTimeout(function(){window.location.href=url;},25); }
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#09090b;-webkit-text-size-adjust:100%}
body{
  font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#09090b;
  color:#f0f2f5;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

:root{
  --pink:#10b981;
  --pink-deep:#059669;
  --pink-bright:#34d399;
  --pink-rgb:16,185,129;
  --text:#f0f2f5;
  --muted:#6b7280;
  --surface:#111114;
  --border-pink:rgba(16,185,129,0.2);
}

/* === AMBIENT BACKGROUND === */
.ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.ambient::before{
  content:"";position:absolute;
  width:700px;height:700px;top:-250px;left:-180px;
  background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 70%);
  animation:drift1 22s ease-in-out infinite;
}
.ambient::after{
  content:"";position:absolute;
  width:580px;height:580px;bottom:-190px;right:-140px;
  background:radial-gradient(circle,rgba(52,211,153,0.07) 0%,transparent 70%);
  animation:drift2 26s ease-in-out infinite;
}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(55px,70px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-38px,-55px)}}

/* === floating sparkles (differentiator) === */
.sparkle{position:absolute;border-radius:50%;background:rgba(255,255,255,0.55);pointer-events:none;animation:rise linear infinite}
@keyframes rise{
  0%{transform:translateY(0) scale(1);opacity:0}
  10%{opacity:.9}
  90%{opacity:.5}
  100%{transform:translateY(-620px) scale(.4);opacity:0}
}

/* === ANIMATIONS === */
@keyframes cardIn{
  from{opacity:0;transform:translateY(26px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes textIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes arrowBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(8px)}
}
@keyframes btnPulse{
  0%,100%{
    box-shadow:0 10px 28px rgba(16,185,129,.3),inset 0 1px 0 rgba(255,255,255,.18);
    transform:scale(1);
  }
  50%{
    box-shadow:0 14px 40px rgba(16,185,129,.48),inset 0 1px 0 rgba(255,255,255,.18);
    transform:scale(1.034);
  }
}
@keyframes shine{
  0%{left:-100%}100%{left:160%}
}

/* === CARD === */
.card{
  position:relative;
  z-index:10;
  width:calc(100% - 48px);
  max-width:340px;
  background:var(--surface);
  border:1px solid var(--border-pink);
  border-radius:24px;
  padding:48px 28px 44px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  box-shadow:0 12px 48px rgba(16,185,129,0.13),0 2px 8px rgba(16,185,129,0.07);
  animation:cardIn .65s cubic-bezier(.16,1,.3,1) both .05s;
}

/* Badge */
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(16,185,129,0.12);
  border:1px solid rgba(16,185,129,0.3);
  border-radius:50px;
  padding:6px 14px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.04em;
  color:var(--pink);
  margin-bottom:18px;
  animation:textIn .5s cubic-bezier(.16,1,.3,1) both .1s;
}

/* Headline */
.headline{
  font-family:"Bricolage Grotesque",sans-serif;
  font-size:clamp(26px,8vw,34px);
  font-weight:800;
  line-height:1.12;
  color:#f0f2f5;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .25s;
}
.headline .hi{
  background:linear-gradient(135deg,var(--pink) 0%,var(--pink-deep) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  display:block;
  margin-top:3px;
}

/* Subtext */
.subtext{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
  line-height:1.7;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .35s;
}

/* Arrow */
.arrow-wrap{
  margin:26px 0 24px;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .4s;
}
.arrow{
  display:inline-block;
  animation:arrowBounce 1.2s ease-in-out infinite;
}
.arrow svg{
  width:30px;height:30px;
  color:var(--pink);
  filter:drop-shadow(0 0 6px rgba(var(--pink-rgb),.4));
}

/* Button */
.cta-btn{
  display:block;
  width:100%;
  padding:20px 24px;
  background:linear-gradient(135deg,var(--pink) 0%,var(--pink-deep) 100%);
  color:#06160f;
  font-family:"DM Sans",sans-serif;
  font-size:15px;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:none;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  animation:btnPulse 2s ease-in-out infinite, textIn .6s cubic-bezier(.16,1,.3,1) both .55s;
  transition:transform .12s;
  user-select:none;
  -webkit-user-select:none;
}
.cta-btn::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);
  animation:shine 3.5s ease-in-out infinite 2s;
  pointer-events:none;
}
.cta-btn:active{transform:scale(.96)!important;animation-play-state:paused}

@media (max-width:375px){
  .card{padding:40px 22px 36px}
  .headline{font-size:clamp(23px,7.6vw,30px)}
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:0.01ms!important;animation-iteration-count:1!important}
}
</style>
</head>
<body>

<div class="ambient" id="sparkleField"></div>

<div class="card">
  <div class="badge">⚡ UK Members Only</div>
  <h1 class="headline">
    Click here to Get
    <span class="hi">£10 Free</span>
  </h1>
  <p class="subtext">Tap below to claim your sign-up bonus and start cashing out today</p>
  <div class="arrow-wrap">
    <span class="arrow">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16.5L4.5 9h15L12 16.5z"/>
      </svg>
    </span>
  </div>
  <button id="ctaBtn" class="cta-btn">Continue</button>
</div>

<script>
(function(){
  // Subtle floating sparkles (differentiating visual touch)
  var field = document.getElementById('sparkleField');
  for (var i = 0; i < 14; i++) {
    var s = document.createElement('div');
    s.className = 'sparkle';
    var size = 2 + Math.random() * 3;
    s.style.width = size + 'px';
    s.style.height = size + 'px';
    s.style.left = Math.random() * 100 + '%';
    s.style.top = (60 + Math.random() * 40) + '%';
    s.style.animationDuration = (6 + Math.random() * 6) + 's';
    s.style.animationDelay = (Math.random() * 6) + 's';
    field.appendChild(s);
  }

  // === CONTINUE BUTTON — kicks out of in-app browsers on click, passes all URL params ===
  var DEST = 'https://www.trendhavenn.com/frrcsh-uk.html';

  function buildUrl(){
    var p = new URLSearchParams(window.location.search);
    return p.toString() ? DEST + '?' + p.toString() : DEST;
  }

  function openInExternalBrowser(url){
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /android/i.test(ua);
    if(isAndroid){
      try{
        var parsed = new URL(url);
        window.location.href = 'intent://' + parsed.hostname + parsed.pathname + parsed.search + parsed.hash + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
      }catch(e){ window.location.href = url; }
    } else if(isIOS){
      window.location.href = url.replace(/^https:\/\//, 'x-safari-https://').replace(/^http:\/\//, 'x-safari-http://');
    } else {
      var w = window.open(url, '_blank', 'noopener,noreferrer');
      if(!w || w.closed || typeof w.closed === 'undefined') window.location.href = url;
    }
  }

  document.getElementById('ctaBtn').addEventListener('click', function(){
    openInExternalBrowser(buildUrl());
  });
})();
</script>
</body>
</html>
