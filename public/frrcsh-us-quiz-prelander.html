<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#09090b">
<title>Freecash – Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#09090b;-webkit-text-size-adjust:100%}
body{
  font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#09090b;
  color:#f0f2f5;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
:root{
  --green:#10b981;
  --green-deep:#059669;
  --green-bright:#34d399;
  --green-rgb:16,185,129;
  --text:#f0f2f5;
  --muted:#6b7280;
  --surface:#111114;
  --border:rgba(16,185,129,0.2);
}
.ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.ambient::before{content:"";position:absolute;width:700px;height:700px;top:-250px;left:-180px;background:radial-gradient(circle,rgba(16,185,129,0.1) 0%,transparent 70%);animation:drift1 22s ease-in-out infinite}
.ambient::after{content:"";position:absolute;width:580px;height:580px;bottom:-190px;right:-140px;background:radial-gradient(circle,rgba(52,211,153,0.07) 0%,transparent 70%);animation:drift2 26s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(55px,70px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-38px,-55px)}}
@keyframes cardIn{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes textIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes btnPulse{
  0%,100%{box-shadow:0 10px 28px rgba(16,185,129,.3),inset 0 1px 0 rgba(255,255,255,.18);transform:scale(1)}
  50%{box-shadow:0 14px 40px rgba(16,185,129,.48),inset 0 1px 0 rgba(255,255,255,.18);transform:scale(1.034)}
}
@keyframes shine{0%{left:-100%}100%{left:160%}}
.card{
  position:relative;z-index:10;
  width:calc(100% - 48px);max-width:340px;
  background:var(--surface);border:1px solid var(--border);border-radius:24px;
  padding:48px 28px 44px;
  display:flex;flex-direction:column;align-items:center;text-align:center;
  box-shadow:0 12px 48px rgba(16,185,129,0.13),0 2px 8px rgba(16,185,129,0.07);
  animation:cardIn .65s cubic-bezier(.16,1,.3,1) both .05s;
}
.icon-wrap{
  width:88px;height:88px;margin:0 auto 26px;border-radius:22px;
  border:1px solid rgba(16,185,129,0.25);background:rgba(16,185,129,0.10);
  display:grid;place-items:center;animation:iconGlow 3s ease-in-out infinite;
}
@keyframes iconGlow{0%,100%{box-shadow:0 0 30px rgba(16,185,129,0.2)}50%{box-shadow:0 0 60px rgba(16,185,129,0.4)}}
.icon-wrap svg{width:36px;height:36px;color:var(--green);stroke-width:2.5}
.headline{
  font-family:"Bricolage Grotesque",sans-serif;
  font-size:clamp(26px,8vw,34px);font-weight:800;line-height:1.12;color:#f0f2f5;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .25s;
}
.headline .hi{
  background:linear-gradient(135deg,var(--green) 0%,var(--green-deep) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  display:block;margin-top:3px;
}
.arrow-wrap{margin:26px 0 24px;animation:textIn .6s cubic-bezier(.16,1,.3,1) both .4s}
.arrow{display:inline-block;animation:arrowBounce 1.2s ease-in-out infinite}
.arrow svg{width:30px;height:30px;color:var(--green);filter:drop-shadow(0 0 6px rgba(var(--green-rgb),.4))}
.cta-btn{
  display:block;width:100%;padding:20px 24px;
  background:linear-gradient(135deg,var(--green) 0%,var(--green-deep) 100%);
  color:#04140d;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:800;
  letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;
  position:relative;overflow:hidden;
  animation:btnPulse 2s ease-in-out infinite, textIn .6s cubic-bezier(.16,1,.3,1) both .55s;
  transition:transform .12s;user-select:none;-webkit-user-select:none;
}
.cta-btn::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.22),transparent);animation:shine 3.5s ease-in-out infinite 2s;pointer-events:none}
.cta-btn:active{transform:scale(.96)!important;animation-play-state:paused}
.cta-btn.loading{opacity:.8}
/* Manual fallback — only shown if the auto-breakout is blocked */
.fallback{display:none;width:100%;margin-top:6px;animation:textIn .4s ease both}
.fb-title{font-family:"Bricolage Grotesque",sans-serif;font-size:19px;font-weight:800;color:var(--green-bright);margin-bottom:8px}
.fb-text{font-size:13px;line-height:1.55;color:#c8ccd2;margin-bottom:14px}
.fb-text b{color:#fff}
.fb-link{font-size:11px;color:var(--muted);word-break:break-all;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:12px;text-align:left;font-family:monospace}
.fb-copy{display:block;width:100%;padding:18px;background:linear-gradient(135deg,var(--green) 0%,var(--green-deep) 100%);color:#04140d;font-family:"DM Sans",sans-serif;font-size:14px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;animation:btnPulse 2s ease-in-out infinite;-webkit-user-select:none;user-select:none}
.fb-copy:active{transform:scale(.96);animation-play-state:paused}
</style>
</head>
<body>

<div class="ambient"></div>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14"></path>
      <path d="M19 12l-7 7-7-7"></path>
    </svg>
  </div>
  <h1 class="headline">
    Click here to Get
    <span class="hi">Started</span>
  </h1>
  <div class="arrow-wrap">
    <span class="arrow">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16.5L4.5 9h15L12 16.5z"/>
      </svg>
    </span>
  </div>
  <button id="ctaBtn" class="cta-btn">Continue</button>
  <div class="fallback" id="fallback">
    <div class="fb-title">One quick step</div>
    <div class="fb-text">Tap <b>Copy Link</b> below, then paste it into <b>Safari</b> or <b>Chrome</b> to claim your bonus.</div>
    <div class="fb-link" id="linkText"></div>
    <button class="fb-copy" id="copyBtn">Copy Link</button>
  </div>
</div>

<script>
// === CONTINUE — attempts Safari/Chrome breakout on tap; if TikTok blocks it, reveals a
// manual Copy-Link fallback (paste into Safari) so users are never stranded. Carries all subIDs. ===
(function(){
  var DEST = 'https://www.trendhavenn.com/frrcsh-us-quiz.html';
  function buildLanderUrl(){
    var p = new URLSearchParams(window.location.search);
    return p.toString() ? DEST + '?' + p.toString() : DEST;
  }
  var landerUrl = buildLanderUrl();
  var ua = navigator.userAgent || navigator.vendor || window.opera;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isAndroid = /android/i.test(ua);

  // If the breakout succeeds the app hands off and this page hides/blurs.
  var leftPage = false;
  document.addEventListener('visibilitychange', function(){ if(document.hidden) leftPage = true; });
  window.addEventListener('pagehide', function(){ leftPage = true; });
  window.addEventListener('blur', function(){ leftPage = true; });

  var ctaBtn = document.getElementById('ctaBtn');
  var fallback = document.getElementById('fallback');
  var linkText = document.getElementById('linkText');
  var copyBtn = document.getElementById('copyBtn');

  function showFallback(){
    if(leftPage) return;                       // breakout worked — user is in Safari/Chrome
    if(fallback.style.display === 'block') return;
    linkText.textContent = landerUrl;
    fallback.style.display = 'block';
    ctaBtn.style.display = 'none';
  }

  ctaBtn.addEventListener('click', function(){
    ctaBtn.textContent = 'Opening…';
    ctaBtn.classList.add('loading');
    if(isIOS){
      window.location.href = landerUrl.replace(/^https:\/\//, 'x-safari-https://');
    } else if(isAndroid){
      window.location.href = 'intent://' + landerUrl.replace(/^https?:\/\//,'') + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
    } else {
      window.location.href = landerUrl;        // desktop / non-mobile: just go
      return;
    }
    setTimeout(showFallback, 1800);            // breakout blocked -> show Copy-Link escape hatch
  });

  function flashCopied(){
    copyBtn.textContent = 'Copied! Now paste in Safari';
    setTimeout(function(){ copyBtn.textContent = 'Copy Link'; }, 2200);
  }
  function legacyCopy(t){
    var ta = document.createElement('textarea');
    ta.value = t; ta.setAttribute('readonly',''); ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.focus(); ta.select();
    try{ document.execCommand('copy'); flashCopied(); }catch(e){}
    document.body.removeChild(ta);
  }
  copyBtn.addEventListener('click', function(){
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(landerUrl).then(flashCopied, function(){ legacyCopy(landerUrl); });
    } else { legacyCopy(landerUrl); }
  });
})();
</script>
</body>
</html>
