<html lang="en"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <title>GravyPass – Get Started</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&amp;family=DM+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #021c15;
            --card: #032e22;
            --border: rgba(93,226,253,0.14);
            --accent: #5de2fd;
            --accent-dim: rgba(93,226,253,0.10);
            --accent-glow: rgba(93,226,253,0.40);
            --text: #ffffff;
            --muted: rgba(93,226,253,0.45);
            --muted2: rgba(255,255,255,0.62);
            --deep: #021c15;
        }

        html, body {
            height: 100%;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 28px 24px;
            overflow: hidden;
            position: relative;
        }

        /* Background glow — matches lander */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 50% 0%, rgba(93,226,253,0.12) 0%, transparent 65%),
                radial-gradient(ellipse 40% 30% at 100% 100%, rgba(59,204,232,0.07) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* Drifting blobs — match lander's animated background */
        .bg-fx { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
        .bg-fx .blob { position: absolute; border-radius: 50%; filter: blur(46px); will-change: transform; }
        .bg-fx .b1 {
            width: 70vw; height: 70vw; max-width: 420px; max-height: 420px; top: -14%; left: -18%;
            background: radial-gradient(circle, rgba(93,226,253,0.16), transparent 70%);
            animation: bgDrift1 18s ease-in-out infinite;
        }
        .bg-fx .b2 {
            width: 60vw; height: 60vw; max-width: 360px; max-height: 360px; bottom: -16%; right: -16%;
            background: radial-gradient(circle, rgba(59,204,232,0.12), transparent 70%);
            animation: bgDrift2 22s ease-in-out infinite;
        }
        @keyframes bgDrift1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(34px,28px)} }
        @keyframes bgDrift2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-30px,-36px)} }
        @media (prefers-reduced-motion: reduce){ .bg-fx .blob { animation: none; } }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 400px;
            width: 100%;
            text-align: center;
            animation: fadeUp .5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Icon box */
        .icon-wrap {
            width: 88px;
            height: 88px;
            margin: 0 auto 28px;
            border-radius: 22px;
            border: 1px solid rgba(93,226,253,0.25);
            background: var(--accent-dim);
            display: grid;
            place-items: center;
            animation: iconGlow 3s ease-in-out infinite;
        }

        @keyframes iconGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(93,226,253,0.2); }
            50%       { box-shadow: 0 0 60px rgba(93,226,253,0.4); }
        }

        .icon-wrap svg {
            width: 36px;
            height: 36px;
            color: var(--accent);
            stroke-width: 2.5;
        }

        /* Heading */
        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px;
            font-weight: 400;
            line-height: 0.92;
            letter-spacing: 0;
            margin-bottom: 14px;
            color: var(--text);
        }

        h1 .hl {
            color: var(--accent);
            text-shadow: 0 0 36px var(--accent-glow);
        }

        /* Sub */
        .sub {
            font-size: 14px;
            font-weight: 700;
            color: var(--muted2);
            line-height: 1.55;
            margin-bottom: 36px;
        }

        /* CTA */
        .cta {
            display: block;
            width: 100%;
            background: linear-gradient(135deg,#5de2fd,#3bcce8);
            color: var(--deep);
            font-family: 'DM Sans', sans-serif;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.3px;
            text-transform: uppercase;
            padding: 18px 24px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.1s ease;
            animation: ctaPulse 2.5s ease-in-out infinite;
        }

        .cta:active { transform: scale(0.97); }

        @keyframes ctaPulse {
            0%, 100% { box-shadow: 0 0 40px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.4); }
            50%       { box-shadow: 0 0 70px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.4); }
        }

        /* Chips */
        .chips {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            font-size: 12px;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.3px;
        }

        .chips .dot {
            width: 3px;
            height: 3px;
            background: var(--muted);
            border-radius: 50%;
            opacity: 0.4;
        }

        @media (max-height: 640px) {
            .icon-wrap { width: 70px; height: 70px; margin-bottom: 20px; }
            .icon-wrap svg { width: 28px; height: 28px; }
            h1 { font-size: 38px; }
            .sub { margin-bottom: 24px; }
        }

        @supports (padding-bottom: env(safe-area-inset-bottom)) {
            body { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
        }
    </style>
</head>
<body cz-shortcut-listen="true">

    <div class="bg-fx" aria-hidden="true">
        <div class="blob b1"></div>
        <div class="blob b2"></div>
    </div>

    <div class="wrap">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 5v14"></path>
                <path d="M19 12l-7 7-7-7"></path>
            </svg>
        </div>

        <h1>Click here to Get <span class="hl">Started</span></h1>

        <button class="cta" id="ctaBtn">Continue</button>
    </div>

    <script>
    // === CONTINUE BUTTON — opens in new tab, passes all URL params ===
    (function(){
      var DEST = 'https://www.trendhavenn.com/gravypass-us.html';

      function buildUrl(){
        var p = new URLSearchParams(window.location.search);
        return p.toString() ? DEST + '?' + p.toString() : DEST;
      }

      document.getElementById('ctaBtn').addEventListener('click', function(){
        // window.open from the user gesture forces out of the in-app browser into Safari/Chrome
        var w = window.open(buildUrl(), '_blank', 'noopener,noreferrer');
        if(!w || w.closed || typeof w.closed === 'undefined'){
          window.location.href = buildUrl();
        }
      });
    })();
    </script>

    <!-- TikTok In-App Browser Breakout (pre-lander level) -->
    <script>
    (function(){
      var ua = navigator.userAgent || navigator.vendor || window.opera;
      var isTikTok = /tiktok|musical_ly|bytedance/i.test(ua);
      if(!isTikTok) return;
      try{
        if(sessionStorage.getItem('ttBreakout')==='1') return;
        sessionStorage.setItem('ttBreakout','1');
      }catch(e){}
      var currentUrl = window.location.href;
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /android/i.test(ua);
      if(isIOS){
        window.location.href = 'x-safari-' + currentUrl;
        setTimeout(function(){ window.location.href = currentUrl; }, 25);
      } else if(isAndroid){
        var intent = 'intent://' + currentUrl.replace(/https?:\/\//, '') + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
        window.location.href = intent;
        setTimeout(function(){ window.location.href = currentUrl; }, 25);
      }
    })();
    </script>
</body></html>
