<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Fr33Cash</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    background: radial-gradient(circle at 50% -10%, #009688 0%, #001515 80%);
    color: #fff;
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
    padding-top: env(safe-area-inset-top, 60px);
    padding-bottom: env(safe-area-inset-bottom, 34px);
  }
  .app {
    max-width: 430px;
    margin: 0 auto;
    padding: 12px 16px 100px;
    min-height: 100dvh;
  }

  /* Top bar */
  .top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    padding-top: 8px;
  }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: #7c4dff;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    position: relative;
  }
  .avatar .dot {
    position: absolute; top: 2px; right: -2px;
    width: 8px; height: 8px;
    background: #ff3b30;
    border-radius: 50%;
    border: 1.5px solid #001515;
  }
  .search-bar {
    flex: 1;
    height: 38px;
    border-radius: 20px;
    border: 1.2px solid rgba(0, 230, 180, 0.35);
    background: rgba(255,255,255,0.04);
    display: flex; align-items: center;
    padding: 0 14px;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 15px;
  }
  .top-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(0, 180, 150, 0.25);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Balance */
  .balance-section {
    text-align: center;
    margin: 32px 0 16px;
  }
  .balance-label {
    font-size: 14px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.3px;
    margin-bottom: 4px;
  }
  .balance {
    font-size: 56px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
  }
  .balance .decimal {
    font-size: 28px;
    font-weight: 500;
    opacity: 0.7;
  }
  .accounts-btn {
    display: inline-block;
    margin-top: 12px;
    padding: 7px 24px;
    border-radius: 20px;
    background: rgba(255,255,255,0.08);
    border: 0.5px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.8);
    font-size: 14px;
    font-weight: 500;
  }

  /* Dots */
  .dots {
    display: flex; justify-content: center; gap: 6px;
    margin: 20px 0 18px;
  }
  .dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
  }
  .dots span.active { background: rgba(255,255,255,0.7); }

  /* Actions */
  .actions {
    display: flex;
    justify-content: space-around;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  .action {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .action-circle {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(255,255,255,0.07);
    border: 0.5px solid rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
  }
  .action-label {
    font-size: 12px;
    color: rgba(255,255,255,0.65);
    font-weight: 500;
  }

  /* Transaction card */
  .tx-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .tx-item {
    display: flex;
    align-items: center;
    padding: 10px 0;
    gap: 12px;
  }
  .tx-item + .tx-item { border-top: 0.5px solid rgba(255,255,255,0.06); }
  .tx-logo {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700;
    font-size: 15px;
    flex-shrink: 0;
    position: relative;
  }
  .tx-logo.fc { background: #00897b; color: #fff; }
  .tx-logo .arrow-badge {
    position: absolute;
    bottom: -2px; right: -2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .tx-logo .arrow-badge svg { width: 9px; height: 9px; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .tx-date {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    margin-top: 2px;
  }
  .tx-amount {
    font-size: 15px;
    font-weight: 600;
    color: #00FF9D;
    flex-shrink: 0;
  }
  .see-all {
    text-align: center;
    padding: 12px 0 4px;
    font-size: 14px;
    color: rgba(255,255,255,0.5);
    font-weight: 500;
  }

  /* Discover */
  .discover-card {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 18px 16px;
    margin-bottom: 20px;
  }
  .discover-card span {
    font-size: 14px;
    color: rgba(255,255,255,0.5);
  }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 24px);
    max-width: 410px;
    padding: 8px 8px calc(8px + env(safe-area-inset-bottom, 20px));
    background: rgba(10, 40, 35, 0.75);
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border-radius: 24px 24px 0 0;
    border-top: 0.5px solid rgba(255,255,255,0.08);
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  .nav-item {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    font-weight: 500;
    position: relative;
    padding: 4px 12px;
  }
  .nav-item.active {
    color: #fff;
    background: rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 6px 16px;
  }
  .nav-item svg { width: 22px; height: 22px; }
  .nav-badge {
    position: absolute;
    top: 2px; right: 8px;
    width: 7px; height: 7px;
    background: #ff3b30;
    border-radius: 50%;
  }
</style>
</head>
<body>
<div class="app">
  <!-- Top Bar -->
  <div class="top-bar">
    <div class="avatar">
      <svg width="20" height="20" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="12" cy="10" r="3"/><path d="M6 21v-1a6 6 0 0112 0v1"/></svg>
      <span class="dot"></span>
    </div>
    <div class="search-bar">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      検索
    </div>
    <div class="top-icon">
      <svg width="20" height="20" fill="none" stroke="#00e6b4" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="12" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
    </div>
    <div class="top-icon">
      <svg width="20" height="20" fill="none" stroke="#00e6b4" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
    </div>
  </div>

  <!-- Balance -->
  <div class="balance-section">
    <div class="balance-label">個人用口座 · JPY</div>
    <div class="balance">¥345,000<span class="decimal">.00</span></div>
    <div class="accounts-btn">口座一覧</div>
  </div>

  <!-- Dots -->
  <div class="dots"><span class="active"></span><span></span></div>

  <!-- Action Buttons -->
  <div class="actions">
    <div class="action">
      <div class="action-circle">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <span class="action-label">入金</span>
    </div>
    <div class="action">
      <div class="action-circle">
        <svg width="24" height="24" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><path d="M8 7h2a4 4 0 010 8H8zm0 0V5h4M16 17h-2a4 4 0 010-8h2zm0 0v2h-4"/></svg>
      </div>
      <span class="action-label">両替</span>
    </div>
    <div class="action">
      <div class="action-circle">
        <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>
      </div>
      <span class="action-label">詳細</span>
    </div>
    <div class="action">
      <div class="action-circle">
        <svg width="22" height="22" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><circle cx="5" cy="12" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="19" cy="12" r="1.5"/></svg>
      </div>
      <span class="action-label">その他</span>
    </div>
  </div>

  <!-- Transactions -->
  <div class="tx-card">
    <div class="tx-item">
      <div class="tx-logo fc">
        FC
        <span class="arrow-badge">
          <svg viewBox="0 0 12 12" fill="none"><path d="M3 9L9 3M9 3H4M9 3v5" stroke="#00897b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </div>
      <div class="tx-info">
        <div class="tx-name">Fr33Cash</div>
        <div class="tx-date">1月23日 10:11</div>
      </div>
      <div class="tx-amount">+¥45,800</div>
    </div>
    <div class="tx-item">
      <div class="tx-logo fc">
        FC
        <span class="arrow-badge">
          <svg viewBox="0 0 12 12" fill="none"><path d="M3 9L9 3M9 3H4M9 3v5" stroke="#00897b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </span>
      </div>
      <div class="tx-info">
        <div class="tx-name">F-Cash</div>
        <div class="tx-date">1月23日 09:42</div>
      </div>
      <div class="tx-amount">+¥52,300</div>
    </div>
    <div class="see-all">すべて見る</div>
  </div>

  <!-- Discover -->
  <div class="discover-card">
    <span>もっと見る ›</span>
  </div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active">
    <svg fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><text x="6" y="18" font-size="16" font-weight="800" fill="#fff" stroke="none" font-family="-apple-system,sans-serif">R</text></svg>
    <span>ホーム</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="12" width="4" height="8" rx="1"/><rect x="10" y="8" width="4" height="12" rx="1"/><rect x="17" y="4" width="4" height="16" rx="1"/></svg>
    <span>投資</span>
  </div>
  <div class="nav-item">
    <span class="nav-badge"></span>
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M7 17l4-4-4-4M13 7l4 4-4 4"/></svg>
    <span>支払い</span>
  </div>
  <div class="nav-item">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="9" cy="7" r="4"/><path d="M3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/><path d="M16 3.13a4 4 0 010 7.75M21 21v-2a4 4 0 00-3-3.87"/></svg>
    <span>ライフ</span>
  </div>
</div>
</body>
</html>
