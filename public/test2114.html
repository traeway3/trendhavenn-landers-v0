<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Freecash - 報酬を獲得</title>
<meta name="description" content="ゲームを選んで、今日から報酬を獲得しよう。">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:hsl(0,0%,4%);
  --fg:hsl(0,0%,95%);
  --card:hsl(0,0%,7%);
  --card-fg:hsl(0,0%,95%);
  --primary:hsl(157,100%,36%);
  --primary-fg:#fff;
  --primary-h:157;--primary-s:100%;--primary-l:36%;
  --muted:hsl(0,0%,12%);
  --muted-fg:hsl(0,0%,60%);
  --border:hsl(0,0%,16%);
  --success:hsl(142,71%,45%);
  --success-fg:#fff;
  --radius:0.75rem;
}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:var(--bg);
  color:var(--fg);
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}

/* Background */
.bg-gradient{
  position:fixed;inset:0;
  background-image:
    radial-gradient(at left top,rgb(0,60,50) 0%,transparent 50%),
    radial-gradient(at right bottom,rgb(0,45,40) 0%,transparent 50%),
    radial-gradient(rgb(10,10,10) 0%,rgb(5,5,5) 100%);
  background-size:300% 300%;
  animation:gradShift 20s ease infinite;
}
@keyframes gradShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.bg-grid{
  position:fixed;inset:0;
  opacity:0.04;
  background-image:
    linear-gradient(#fff 1px,transparent 1px),
    linear-gradient(90deg,#fff 1px,transparent 1px);
  background-size:60px 60px;
}

/* Views */
.view{
  position:relative;z-index:10;
  margin:0 auto;
  max-width:28rem;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
  padding:64px 20px;
}
.view.hidden{display:none}

/* Logo */
.logo-ring{
  display:flex;align-items:center;justify-content:center;
  width:80px;height:80px;
  border-radius:50%;
  border:1px solid hsla(157,100%,36%,0.2);
  background:rgba(255,255,255,0.1);
  overflow:hidden;
  animation:logoEntrance .6s ease-out .3s both,logoGlow 3s ease-in-out infinite;
}
.logo-ring img{width:64px;height:64px;border-radius:50%;object-fit:cover}
@keyframes logoEntrance{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes logoGlow{
  0%,100%{box-shadow:0 0 20px hsla(157,100%,36%,0.2),0 0 60px hsla(157,100%,36%,0.1)}
  50%{box-shadow:0 0 30px hsla(157,100%,36%,0.35),0 0 80px hsla(157,100%,36%,0.15)}
}

/* Badge */
.badge{
  display:flex;align-items:center;gap:10px;
  margin-top:20px;
  border-radius:9999px;
  border:1px solid hsla(142,71%,45%,0.3);
  background:hsla(142,71%,45%,0.1);
  padding:8px 16px;
  animation:badgePop .4s ease-out .7s both;
}
@keyframes badgePop{from{opacity:0;transform:scale(0.8)}to{opacity:1;transform:scale(1)}}
.badge-icon{
  display:flex;align-items:center;justify-content:center;
  width:20px;height:20px;border-radius:50%;
  background:var(--success);
}
.badge-icon svg{width:12px;height:12px;color:var(--success-fg)}
.badge span{font-size:12px;font-weight:600;color:var(--success)}

/* Headings */
.main-title{
  margin-top:24px;
  text-align:center;
  font-size:24px;font-weight:700;
  letter-spacing:-0.025em;
  color:var(--fg);
  animation:textSlide .5s ease-out .9s both;
}
.main-sub{
  margin-top:12px;
  max-width:280px;
  text-align:center;
  font-size:14px;
  line-height:1.6;
  color:var(--muted-fg);
  animation:textSlide .5s ease-out 1.1s both;
}
@keyframes textSlide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* Game cards */
.cards{margin-top:32px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px}
.game-card{
  display:flex;align-items:center;gap:16px;
  width:100%;
  padding:16px;
  border-radius:12px;
  border:1px solid hsla(0,0%,16%,0.5);
  background:hsla(0,0%,7%,0.6);
  backdrop-filter:blur(8px);
  cursor:pointer;
  transition:all .2s;
  animation:cardReveal .5s ease-out both;
}
.game-card:nth-child(1){animation-delay:1.3s}
.game-card:nth-child(2){animation-delay:1.45s}
.game-card:nth-child(3){animation-delay:1.6s}
@keyframes cardReveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.game-card:active{
  border-color:hsla(157,100%,36%,0.4);
  background:hsla(157,100%,36%,0.1);
  box-shadow:0 0 20px hsla(157,100%,36%,0.15);
}
.card-icon{
  width:56px;height:56px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:12px;
  border:1px solid hsla(157,100%,36%,0.2);
  background:rgba(255,255,255,0.1);
  overflow:hidden;
}
.card-icon img{width:48px;height:48px;border-radius:8px;object-fit:cover}
.card-text{flex:1;text-align:left}
.card-text h3{font-size:14px;font-weight:700;color:var(--fg)}
.card-text p{font-size:16px;font-weight:700;color:var(--primary)}
.card-chevron{
  width:20px;height:20px;flex-shrink:0;
  color:var(--muted-fg);
  transition:transform .2s,color .2s;
}
.game-card:active .card-chevron{transform:translateX(4px);color:var(--primary)}

/* Footer */
.trust-footer{
  margin-top:40px;
  text-align:center;
  font-size:11px;
  color:hsla(0,0%,60%,0.6);
  animation:textSlide .5s ease-out 1.8s both;
}

/* ═══════ DETAIL VIEW ═══════ */
.detail-logos{display:flex;align-items:center;gap:12px}
.detail-logo-ring{
  display:flex;align-items:center;justify-content:center;
  width:80px;height:80px;
  border-radius:50%;
  border:1px solid hsla(157,100%,36%,0.2);
  background:rgba(255,255,255,0.1);
  overflow:hidden;
  box-shadow:0 0 20px hsla(157,100%,36%,0.2),0 0 60px hsla(157,100%,36%,0.1);
}
.detail-logo-ring img{width:64px;height:64px;border-radius:50%;object-fit:cover}
.detail-x{font-size:18px;font-weight:700;color:var(--muted-fg)}

.detail-title{
  margin-top:24px;
  text-align:center;
  font-size:24px;font-weight:700;
  letter-spacing:-0.025em;
  color:var(--fg);
}
.detail-desc{
  margin-top:12px;
  max-width:280px;
  text-align:center;
  font-size:14px;
  line-height:1.6;
  color:var(--muted-fg);
}

/* Download button */
.download-btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  margin-top:32px;
  width:100%;max-width:320px;
  padding:16px 32px;
  border:none;border-radius:8px;
  font-size:16px;font-weight:700;
  letter-spacing:0.05em;
  color:var(--primary-fg);
  background:var(--primary);
  cursor:pointer;
  animation:dlPulse 1.8s ease-in-out infinite;
  transition:all .2s;
}
.download-btn:active{animation-play-state:paused;transform:scale(1.04)}
.download-btn svg{width:20px;height:20px;margin-right:8px}
@keyframes dlPulse{
  0%,100%{transform:scale(1);box-shadow:0 0 20px hsla(157,100%,36%,0.45)}
  50%{transform:scale(1.035);box-shadow:0 0 34px hsla(157,100%,36%,0.75)}
}

/* Journey section */
.journey{margin-top:32px;width:100%;max-width:320px}
.journey-title{
  text-align:center;
  font-size:12px;font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.2em;
  color:var(--muted-fg);
  margin-bottom:16px;
}
.journey-steps{display:flex;flex-direction:column;gap:12px}
.step{
  display:flex;align-items:flex-start;gap:12px;
  border-radius:12px;
  padding:10px;
}
.step.highlighted{
  border:1px solid hsla(157,100%,36%,0.3);
  background:hsla(157,100%,36%,0.1);
}
.step-num{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  border-radius:50%;
  font-size:12px;font-weight:700;
}
.step-num.dim{background:hsla(157,100%,36%,0.15);color:var(--primary)}
.step-num.bright{background:var(--primary);color:var(--primary-fg)}
.step-info{flex:1;min-width:0}
.step-info h3{font-size:14px;font-weight:600;color:var(--fg)}
.step-info p{margin-top:2px;font-size:12px;color:var(--muted-fg)}

/* Bonus tip */
.bonus{
  margin-top:16px;
  border-radius:12px;
  border:1px solid hsla(157,100%,36%,0.2);
  background:hsla(157,100%,36%,0.05);
  padding:12px;
}
.bonus-inner{display:flex;align-items:flex-start;gap:10px}
.bonus-lock{width:16px;height:16px;flex-shrink:0;margin-top:2px;color:var(--primary)}
.bonus-content{flex:1;min-width:0}
.bonus-header{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.bonus-header h3{font-size:12px;font-weight:700;color:var(--fg)}
.bonus-tag{
  display:inline-block;
  padding:2px 6px;
  border-radius:4px;
  background:hsla(157,100%,36%,0.9);
  font-size:9px;font-weight:700;
  text-transform:uppercase;
  color:var(--primary-fg);
}
.bonus-content p{font-size:12px;line-height:1.6;color:var(--muted-fg)}
.bonus-content .hl{font-weight:700;color:var(--primary)}
</style>
</head>

  var selectorView=document.getElementById('selectorView');
  var detailView=document.getElementById('detailView');
  var gameLogoEl=document.getElementById('gameLogo');
  var gameTitleEl=document.getElementById('gameTitle');
  var gameDescEl=document.getElementById('gameDesc');
  var step2TitleEl=document.getElementById('step2Title');
  var step2DescEl=document.getElementById('step2Desc');
  var downloadBtn=document.getElementById('downloadBtn');

  function computeDownloadURL(){
    var base='https://go.goldentracee.com/click';
    var params=new URLSearchParams(window.location.search);
    var forward=new URLSearchParams();
    params.forEach(function(v,k){if(k!=='game')forward.set(k,v)});
    var qs=forward.toString();
    return qs?base+'?'+qs:base;
  }

  function populateDetail(gameKey){
    var game=games[gameKey]||games.subway;
    var verbLower=game.verb.toLowerCase();
    gameLogoEl.src=game.logo;
    gameLogoEl.alt=game.alt;
    gameTitleEl.textContent=game.name+'で'+game.verb+'して稼ごう';
    gameDescEl.textContent='アプリをダウンロードしてフルアクセスを有効にし、今日から'+game.name+'で稼ぎ始めよう。';
    step2TitleEl.textContent=game.name+'の'+game.verb+'報酬をアンロック';
    step2DescEl.textContent='1〜2つのタスクを完了して、'+game.name+'の報酬方法をアンロックしよう。';
    document.title=game.name+'で稼ごう | Freecash';
  }

  var currentGame=null;

  function showSelector(){
    currentGame=null;
    selectorView.classList.remove('hidden');
    detailView.classList.add('hidden');
    document.title='Freecash - 報酬を獲得';
  }

  function showDetail(gameKey){
    if(gameKey&&games[gameKey]){
      currentGame=gameKey;
      populateDetail(gameKey);
      selectorView.classList.add('hidden');
      detailView.classList.remove('hidden');
      window.scrollTo(0,0);
    }
  }

  downloadBtn.addEventListener('click',function(){
    window.location.href=computeDownloadURL();
  });

  document.querySelectorAll('#selectorView .game-card').forEach(function(btn){
    btn.addEventListener('click',function(){
      var gameKey=btn.getAttribute('data-game');
      showDetail(gameKey);
    });
  });

  showSelector();
})();
</script>
