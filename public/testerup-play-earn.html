<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b0a1d">
<title>Testerup – Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#0b0a1d;-webkit-text-size-adjust:100%}
body{
  font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0b0a1d;
  color:#f0f0f8;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

:root{
  --red:#e02b2b;
  --red-deep:#b81f1f;
  --red-bright:#f05050;
  --red-rgb:224,43,43;
  --navy:#0b0a1d;
  --navy-card:#13122a;
  --navy-border:rgba(224,43,43,0.25);
}

/* === AMBIENT BACKGROUND === */
.ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.ambient::before{
  content:"";position:absolute;
  width:650px;height:650px;top:-240px;left:-160px;
  background:radial-gradient(circle,rgba(220,30,30,0.18) 0%,transparent 68%);
  animation:drift1 20s ease-in-out infinite;
}
.ambient::after{
  content:"";position:absolute;
  width:520px;height:520px;bottom:-180px;right:-130px;
  background:radial-gradient(circle,rgba(180,20,50,0.13) 0%,transparent 68%);
  animation:drift2 26s ease-in-out infinite;
}
.ambient-mid{
  position:fixed;
  width:400px;height:400px;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(224,43,43,0.06) 0%,transparent 70%);
  pointer-events:none;z-index:0;
  animation:drift3 18s ease-in-out infinite;
}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(48px,62px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-34px,-48px)}}
@keyframes drift3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.15)}}

/* === ENTRANCE ANIMATIONS === */
@keyframes cardIn{
  from{opacity:0;transform:translateY(28px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes textIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes arrowBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(9px)}
}
@keyframes btnPulse{
  0%,100%{
    box-shadow:0 0 24px rgba(var(--red-rgb),.45),0 10px 32px rgba(var(--red-rgb),.22);
    transform:scale(1);
  }
  50%{
    box-shadow:0 0 48px rgba(var(--red-rgb),.75),0 12px 46px rgba(var(--red-rgb),.4);
    transform:scale(1.036);
  }
}
@keyframes shine{
  0%{left:-100%}100%{left:160%}
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-5px)}
}

/* === CARD === */
.card{
  position:relative;
  z-index:10;
  width:calc(100% - 48px);
  max-width:340px;
  background:var(--navy-card);
  border:1px solid var(--navy-border);
  border-radius:26px;
  padding:44px 28px 42px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  box-shadow:0 0 60px rgba(224,43,43,0.12),0 20px 60px rgba(0,0,0,0.55),inset 0 1px 0 rgba(255,255,255,0.05);
  animation:cardIn .65s cubic-bezier(.16,1,.3,1) both .05s;
}

/* === LOGO === */
.logo-wrap{
  margin-bottom:22px;
  animation:textIn .5s cubic-bezier(.16,1,.3,1) both .1s;
}
.logo-wrap img{
  width:64px;height:64px;
  border-radius:16px;
  box-shadow:0 4px 24px rgba(224,43,43,0.3);
  animation:logoFloat 3.5s ease-in-out infinite;
}

/* === HEADLINE === */
.headline{
  font-size:clamp(26px,8vw,32px);
  font-weight:800;
  line-height:1.13;
  color:#f0f0f8;
  letter-spacing:-0.02em;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .25s;
}
.headline .hi{
  background:linear-gradient(135deg,var(--red-bright) 0%,var(--red) 50%,var(--red-deep) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  display:block;
  margin-top:4px;
}

/* === ARROW === */
.arrow-wrap{
  margin:26px 0 24px;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .4s;
}
.arrow{display:inline-block;animation:arrowBounce 1.15s ease-in-out infinite}
.arrow svg{
  width:30px;height:30px;
  color:var(--red);
  filter:drop-shadow(0 0 8px rgba(var(--red-rgb),.55));
}

/* === CTA BUTTON === */
.cta-btn{
  display:block;
  width:100%;
  padding:20px 24px;
  background:linear-gradient(135deg,#e02b2b 0%,#c41c1c 50%,#a81515 100%);
  color:#fff;
  font-family:"DM Sans",sans-serif;
  font-size:15px;
  font-weight:800;
  letter-spacing:.12em;
  text-transform:uppercase;
  border:none;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  animation:btnPulse 2.1s ease-in-out infinite, textIn .6s cubic-bezier(.16,1,.3,1) both .55s;
  transition:transform .12s;
  user-select:none;
  -webkit-user-select:none;
}
.cta-btn::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.24),transparent);
  animation:shine 3.5s ease-in-out infinite 2s;
  pointer-events:none;
}
.cta-btn:active{transform:scale(.96)!important;animation-play-state:paused}
</style>
</head>
