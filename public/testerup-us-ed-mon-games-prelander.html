<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0b1d">
<title>Open in Browser</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
        --bg: #0f0b1d;
        --card: #1a1430;
        --border: rgba(255,255,255,0.07);
        --accent: #e01e2b;
        --accent-dim: rgba(224,30,43,0.15);
        --accent-glow: rgba(224,30,43,0.4);
        --text: #f5f3fa;
        --muted: #666;
        --muted2: #999;
    }

    html, body {
        height: 100%;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
    }

    body {
        font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 28px 24px;
        overflow: hidden;
        position: relative;
    }

    /* Background glow — matches lander */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        background:
            radial-gradient(ellipse 60% 40% at 50% 0%, rgba(224,30,43,0.12) 0%, transparent 65%),
            radial-gradient(ellipse 40% 30% at 100% 100%, rgba(224,30,43,0.06) 0%, transparent 60%);
        pointer-events: none;
        z-index: 0;
    }

    .wrap {
        position: relative;
        z-index: 1;
        max-width: 400px;
        width: 100%;
        text-align: center;
        animation: fadeUp .5s ease both;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
    }

    /* Icon box */
    .icon-wrap {
        width: 88px;
        height: 88px;
        margin: 0 auto 28px;
        border-radius: 22px;
        border: 1px solid rgba(224,30,43,0.25);
        background: var(--accent-dim);
        display: grid;
        place-items: center;
        animation: iconGlow 3s ease-in-out infinite;
    }

    @keyframes iconGlow {
        0%, 100% { box-shadow: 0 0 30px rgba(224,30,43,0.2); }
        50%       { box-shadow: 0 0 60px rgba(224,30,43,0.4); }
    }

    .icon-wrap svg {
        width: 36px;
        height: 36px;
        color: var(--accent);
        stroke-width: 2.5;
    }

    /* Heading */
    h1 {
        font-family: 'Nunito', sans-serif;
        font-size: 48px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -1.5px;
        margin-bottom: 12px;
        color: var(--text);
    }

    h1 .hl {
        color: var(--accent);
    }

    /* Sub */
    .sub {
        font-size: 14px;
        font-weight: 700;
        color: var(--muted2);
        line-height: 1.55;
        margin-bottom: 36px;
    }

    /* CTA */
    .cta {
        display: block;
        width: 100%;
        background: var(--accent);
        color: #fff;
        font-family: 'Nunito', sans-serif;
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.3px;
        text-transform: uppercase;
        padding: 18px 24px;
        border-radius: 14px;
        border: none;
        cursor: pointer;
        margin-bottom: 20px;
        transition: transform 0.1s ease;
        animation: ctaPulse 2.5s ease-in-out infinite;
    }

    .cta:active { transform: scale(0.97); }

    @keyframes ctaPulse {
        0%, 100% { box-shadow: 0 0 40px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.4); }
        50%       { box-shadow: 0 0 70px var(--accent-glow), 0 4px 20px rgba(0,0,0,0.4); }
    }

    /* Chips */
    .chips {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 14px;
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 0.3px;
    }

    .chips .dot {
        width: 3px;
        height: 3px;
        background: var(--muted);
        border-radius: 50%;
        opacity: 0.4;
    }

    @media (max-height: 640px) {
        .icon-wrap { width: 70px; height: 70px; margin-bottom: 20px; }
        .icon-wrap svg { width: 28px; height: 28px; }
        h1 { font-size: 38px; }
        .sub { margin-bottom: 24px; }
    }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
        body { padding-bottom: calc(28px + env(safe-area-inset-bottom)); }
    }
</style>
</head>
<body>
    <div class="wrap">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 17L17 7"></path>
                <path d="M7 7h10v10"></path>
            </svg>
        </div>
        <h1>Open in <span class="hl">Browser</span></h1>
        <p class="sub">Tap Continue to open this page in your browser for the full experience.</p>
        <button class="cta" id="ctaBtn">Continue</button>
        <div class="chips">
            <span>Safari</span>
            <span class="dot"></span>
            <span>Chrome</span>
            <span class="dot"></span>
            <span>Secure</span>
        </div>
    </div>

    <script>
        document.getElementById('ctaBtn').addEventListener('click', function(e) {
            e.preventDefault();

            // Testerup US -> Monetise (manual/straight-link) games lander on trendhavenn.
            // Forward the ENTIRE inbound query string untouched so the click ID
            // (sub1/campid/etc.) survives this hop — the lander reads it and carries
            // it into the offer's s1.
            var dest = 'https://www.trendhavenn.com/testerup-us-ed-mon-games.html';

            var currentParams = new URLSearchParams(window.location.search);
            if (currentParams.toString()) {
                dest += (dest.indexOf('?') === -1 ? '?' : '&') + currentParams.toString();
            }

            var url;

            if (/Android/i.test(navigator.userAgent)) {
                url = 'intent://' + dest.replace(/^https?:\/\//, '') + '#Intent;scheme=https;end';
            } else {
                url = dest.replace(/^https:\/\//, 'x-safari-https://');
            }

            try {
                (window.top || window).location.href = url;
            } catch(err) {
                window.location.href = url;
            }
        });
    </script>
</body>
</html>
