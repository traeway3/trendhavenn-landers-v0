<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f0b1d">
<title>TesterUp – Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#0f0b1d;-webkit-text-size-adjust:100%}
body{
  font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#0f0b1d;color:#f5f3fa;
  min-height:100vh;
  min-height:100dvh;
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
:root{
  --red:#e01e2b;--red-deep:#b3121d;--red-rgb:224,30,43;
  --text:#f5f3fa;--surface:#1a1430;--border:rgba(224,30,43,0.2);
}
.ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.ambient::before{content:"";position:absolute;width:700px;height:700px;top:-250px;left:-180px;background:radial-gradient(circle,rgba(224,30,43,0.12) 0%,transparent 70%);animation:drift1 16s ease-in-out infinite}
.ambient::after{content:"";position:absolute;width:580px;height:580px;bottom:-190px;right:-140px;background:radial-gradient(circle,rgba(242,74,82,0.08) 0%,transparent 70%);animation:drift2 19s ease-in-out infinite}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(55px,70px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-38px,-55px)}}
@keyframes cardIn{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes textIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes arrowBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@keyframes btnPulse{0%,100%{box-shadow:0 10px 28px rgba(224,30,43,.3),inset 0 1px 0 rgba(255,255,255,.18);transform:scale(1)}50%{box-shadow:0 14px 40px rgba(224,30,43,.5),inset 0 1px 0 rgba(255,255,255,.18);transform:scale(1.034)}}
@keyframes shine{0%{left:-100%}100%{left:160%}}
.card{position:relative;z-index:10;width:calc(100% - 48px);max-width:340px;background:var(--surface);border:1px solid var(--border);border-radius:24px;padding:48px 28px 44px;display:flex;flex-direction:column;align-items:center;text-align:center;box-shadow:0 12px 48px rgba(224,30,43,0.16),0 2px 8px rgba(0,0,0,0.4);animation:cardIn .65s cubic-bezier(.16,1,.3,1) both .05s}
.icon-wrap{width:88px;height:88px;margin:0 auto 26px;border-radius:22px;border:1px solid rgba(224,30,43,0.28);background:rgba(224,30,43,0.10);display:grid;place-items:center;animation:iconGlow 3s ease-in-out infinite}
@keyframes iconGlow{0%,100%{box-shadow:0 0 30px rgba(224,30,43,0.22)}50%{box-shadow:0 0 60px rgba(224,30,43,0.42)}}
.icon-wrap svg{width:36px;height:36px;color:var(--red);stroke-width:2.5}
.headline{font-family:"Bricolage Grotesque",sans-serif;font-size:clamp(26px,8vw,34px);font-weight:800;line-height:1.12;color:#f5f3fa;animation:textIn .6s cubic-bezier(.16,1,.3,1) both .25s}
.headline .hi{background:linear-gradient(135deg,var(--red) 0%,var(--red-deep) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;margin-top:3px}
.arrow-wrap{margin:26px 0 24px;animation:textIn .6s cubic-bezier(.16,1,.3,1) both .4s}
.arrow{display:inline-block;animation:arrowBounce 1.2s ease-in-out infinite}
.arrow svg{width:30px;height:30px;color:var(--red);filter:drop-shadow(0 0 6px rgba(var(--red-rgb),.45))}
.cta-btn{display:block;width:100%;padding:20px 24px;background:linear-gradient(135deg,var(--red) 0%,var(--red-deep) 100%);color:#fff;font-family:"DM Sans",sans-serif;font-size:15px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;border:none;border-radius:50px;cursor:pointer;position:relative;overflow:hidden;animation:btnPulse 2s ease-in-out infinite, textIn .6s cubic-bezier(.16,1,.3,1) both .55s;transition:transform .12s;user-select:none;-webkit-user-select:none}
.cta-btn::after{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shine 3.5s ease-in-out infinite 2s;pointer-events:none}
.cta-btn:active{transform:scale(.96)!important;animation-play-state:paused}
</style>
</head>
<body>

<div class="ambient"></div>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5v14"></path>
      <path d="M19 12l-7 7-7-7"></path>
    </svg>
  </div>
  <h1 class="headline">
    Click here to Get
    <span class="hi">Started</span>
  </h1>
  <div class="arrow-wrap">
    <span class="arrow">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16.5L4.5 9h15L12 16.5z"/>
      </svg>
    </span>
  </div>
  <button id="ctaBtn" class="cta-btn">Continue</button>
</div>

<script>
// === CONTINUE BUTTON — breaks out to Safari/Chrome ON CLICK ONLY ===
// No on-load breakout: the Carrd cloaker in front handles bot protection, so this prelander
// renders normally on landing and only kicks out of the in-app browser when Continue is tapped.
// Passes all URL params (subIDs) through to the lander.
(function(){
  var DEST = 'https://www.trendhavenn.com/testerup-us-quiz.html';
  function buildUrl(){
    var p = new URLSearchParams(window.location.search);
    return p.toString() ? DEST + '?' + p.toString() : DEST;
  }
  document.getElementById('ctaBtn').addEventListener('click', function(){
    var dest = buildUrl();
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /android/i.test(ua);
    var url;
    if(isAndroid){ url = 'intent://' + dest.replace(/^https?:\/\//,'') + '#Intent;scheme=https;action=android.intent.action.VIEW;end'; }
    else if(isIOS){ url = dest.replace(/^https:\/\//, 'x-safari-https://'); }
    else { window.location.href = dest; return; }
    try { (window.top || window).location.href = url; }
    catch(e){ window.location.href = dest; }
  });
})();
</script>
</body>
</html>
