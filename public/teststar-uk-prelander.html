<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07060E">
<title>TestStar – Earn £10 Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Bricolage+Grotesque:wght@700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{background:#07060E;-webkit-text-size-adjust:100%}
body{
  font-family:"DM Sans",-apple-system,BlinkMacSystemFont,sans-serif;
  background:#07060E;
  color:#f0f4ff;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}

:root{
  --primary: #f59e0b;
  --primary-deep: #d97706;
  --primary-rgb: 245,158,11;
  --text: #f0f4ff;
  --muted: rgba(240,244,255,0.5);
  --surface: #0E0E16;
  --border: rgba(245,158,11,0.22);
}

/* === AMBIENT BACKGROUND === */
.ambient{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.ambient::before{
  content:"";position:absolute;
  width:700px;height:700px;top:-250px;left:-180px;
  background:radial-gradient(circle,rgba(245,158,11,0.10) 0%,transparent 65%);
  animation:drift1 22s ease-in-out infinite;
}
.ambient::after{
  content:"";position:absolute;
  width:580px;height:580px;bottom:-190px;right:-140px;
  background:radial-gradient(circle,rgba(217,119,6,0.08) 0%,transparent 65%);
  animation:drift2 26s ease-in-out infinite;
}
@keyframes drift1{0%,100%{transform:translate(0,0)}50%{transform:translate(55px,70px)}}
@keyframes drift2{0%,100%{transform:translate(0,0)}50%{transform:translate(-38px,-55px)}}

/* === ANIMATIONS === */
@keyframes cardIn{
  from{opacity:0;transform:translateY(26px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes textIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes arrowBounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(8px)}
}
@keyframes btnPulse{
  0%,100%{
    box-shadow:0 0 28px rgba(245,158,11,.5),0 0 55px rgba(245,158,11,.18),inset 0 1px 0 rgba(255,255,255,.15);
    transform:scale(1);
  }
  50%{
    box-shadow:0 0 50px rgba(245,158,11,.85),0 0 90px rgba(245,158,11,.35),inset 0 1px 0 rgba(255,255,255,.15);
    transform:scale(1.034);
  }
}
@keyframes shine{0%{left:-100%}100%{left:160%}}

/* === CARD === */
.card{
  position:relative;
  z-index:10;
  width:calc(100% - 48px);
  max-width:340px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px 28px 44px;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  box-shadow:0 12px 48px rgba(245,158,11,0.12),0 2px 8px rgba(245,158,11,0.06);
  animation:cardIn .65s cubic-bezier(.16,1,.3,1) both .05s;
}

/* Star badge */
.badge{
  display:inline-flex;
  align-items:center;
  gap:6px;
  background:rgba(245,158,11,0.12);
  border:1px solid rgba(245,158,11,0.3);
  border-radius:50px;
  padding:6px 14px;
  font-size:12px;
  font-weight:700;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--primary);
  margin-bottom:20px;
  animation:textIn .5s cubic-bezier(.16,1,.3,1) both .1s;
}

/* Headline */
.headline{
  font-family:"Bricolage Grotesque",sans-serif;
  font-size:clamp(26px,8vw,34px);
  font-weight:800;
  line-height:1.12;
  color:var(--text);
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .25s;
}
.headline .hi{
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-deep) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  display:block;
  margin-top:3px;
}

/* Subtext */
.subtext{
  margin-top:10px;
  font-size:14px;
  color:var(--muted);
  line-height:1.6;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .35s;
}

/* Arrow */
.arrow-wrap{
  margin:26px 0 24px;
  animation:textIn .6s cubic-bezier(.16,1,.3,1) both .4s;
}
.arrow{
  display:inline-block;
  animation:arrowBounce 1.2s ease-in-out infinite;
}
.arrow svg{
  width:30px;height:30px;
  color:var(--primary);
  filter:drop-shadow(0 0 6px rgba(245,158,11,.55));
}

/* Button */
.cta-btn{
  display:block;
  width:100%;
  padding:20px 24px;
  background:linear-gradient(135deg,var(--primary) 0%,var(--primary-deep) 100%);
  color:#07070f;
  font-family:"DM Sans",sans-serif;
  font-size:15px;
  font-weight:800;
  letter-spacing:.1em;
  text-transform:uppercase;
  border:none;
  border-radius:50px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  animation:btnPulse 2s ease-in-out infinite, textIn .6s cubic-bezier(.16,1,.3,1) both .55s;
  transition:transform .12s;
  user-select:none;
  -webkit-user-select:none;
}
.cta-btn::after{
  content:'';
  position:absolute;top:0;left:-100%;
  width:50%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.28),transparent);
  animation:shine 3.5s ease-in-out infinite 2s;
  pointer-events:none;
}
.cta-btn:active{transform:scale(.96)!important;animation-play-state:paused}
</style>
</head>
<body>

<div class="ambient"></div>

<div class="card">
  <div class="badge">⭐ UK Exclusive</div>
  <h1 class="headline">
    Tap Here to
    <span class="hi">Earn £10 Today</span>
  </h1>
  <p class="subtext">Complete quick surveys &amp; get paid instantly via PayPal or Revolut</p>
  <div class="arrow-wrap">
    <span class="arrow">
      <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 16.5L4.5 9h15L12 16.5z"/>
      </svg>
    </span>
  </div>
  <button id="ctaBtn" class="cta-btn">Claim My £10 Bonus</button>
</div>

<script>
(function(){
  var DEST = 'https://www.trendhavenn.com/teststar-uk.html';

  function buildUrl(){
    var p = new URLSearchParams(window.location.search);
    return p.toString() ? DEST + '?' + p.toString() : DEST;
  }

  function openInExternalBrowser(url){
    var ua = navigator.userAgent || navigator.vendor || window.opera;
    var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
    var isAndroid = /android/i.test(ua);
    if(isAndroid){
      try{
        var parsed = new URL(url);
        window.location.href = 'intent://' + parsed.hostname + parsed.pathname + parsed.search + parsed.hash + '#Intent;scheme=https;action=android.intent.action.VIEW;end';
      }catch(e){ window.location.href = url; }
    } else if(isIOS){
      window.location.href = url.replace(/^https:\/\//, 'x-safari-https://').replace(/^http:\/\//, 'x-safari-http://');
    } else {
      var w = window.open(url, '_blank', 'noopener,noreferrer');
      if(!w || w.closed || typeof w.closed === 'undefined') window.location.href = url;
    }
  }

  document.getElementById('ctaBtn').addEventListener('click', function(){
    openInExternalBrowser(buildUrl());
  });
})();
</script>

</body>
</html>
